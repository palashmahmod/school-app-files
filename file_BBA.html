<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লজিক নির্ধারণ - BBA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #4b6681 0%, #31475e 100%);
            --white: #ffffff;
            --primary-blue: #1a73e8;
            --text-dark: #2c3e50;
            --accent-light: #eef5ff;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-dark);
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 30px; color: var(--white); }
        .header h1 { font-size: 22px; font-weight: 800; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        /* সেকশন কার্ড ডিজাইন */
        .section-card { 
            background: var(--white); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 25px; 
            box-shadow: 8px 8px 15px rgba(0,0,0,0.4); /* ৩ডি শ্যাডো */
        }

        h2 { 
            font-size: 16px; 
            margin-top: 0;
            margin-bottom: 20px; 
            color: var(--primary-blue); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-bottom: 2px solid #f0f2f5; 
            padding-bottom: 10px; 
        }

        .option-group { display: flex; flex-direction: column; gap: 12px; }

        /* রেডিও বাটন অপশন আইটেম */
        .option-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 14px; 
            border: 1.5px solid #edeef0; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.2s ease; 
            background: #fff;
            position: relative;
        }

        .option-item:hover { background: #fafafa; border-color: #d1d9e6; }

        .option-item input[type="radio"] { 
            margin: 0; 
            width: 18px; 
            height: 18px; 
            cursor: pointer; 
            accent-color: var(--primary-blue);
        }

        .option-item label { 
            cursor: pointer; 
            font-size: 13px; 
            line-height: 1.5; 
            flex: 1; 
            color: #444; 
            font-weight: 500;
        }

        /* সিলেক্টেড স্টাইল */
        .option-item:has(input:checked) { 
            border-color: var(--primary-blue); 
            background: var(--accent-light); 
            box-shadow: inset 0 0 0 1px var(--primary-blue);
        }

        input[type="radio"]:checked + label { font-weight: 700; color: #000; }

        .badge { 
            background: var(--primary-blue); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: bold;
            margin-right: 5px;
            text-transform: uppercase;
        }

        /* একশন বাটন */
        .btn-save { 
            width: 100%; 
            padding: 16px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 10px 0; 
            box-shadow: 0 6px 0px #1e8449, 0 10px 15px rgba(0,0,0,0.3); /* ৩ডি পুশ লুক */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.1s;
        }

        .btn-save:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0px #1e8449, 0 5px 10px rgba(0,0,0,0.2); 
        }

        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            text-decoration: none; 
            color: var(--white); 
            font-size: 14px; 
            font-weight: bold;
            opacity: 0.8;
            transition: 0.3s;
        }
        .back-link:hover { opacity: 1; text-decoration: underline; }

        .footer-text { 
            text-align: center; 
            font-size: 10px; 
            margin-top: 40px; 
            color: rgba(255,255,255,0.5); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-microchip" style="margin-right: 10px;"></i> লজিক কন্ট্রোল প্যানেল</h1>
    </div>

    <div class="section-card">
        <h2><i class="fas fa-vial"></i> বিষয়ভিত্তিক পাশ ও গ্রেড সিস্টেম</h2>
        <div class="option-group">
            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml1" value="1">
                <label for="ml1"><span class="badge">অপশন ১</span> বাংলা/ইংরেজি মোট ৫০ পাস। অন্যান্য বিষয়ে ৩৩/১৭ পাস। (CQ/MCQ আলাদা নয়)</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml2" value="2">
                <label for="ml2"><span class="badge">অপশন ২</span> বাংলা/ইংরেজি উভয় পত্রে আলাদাভাবে (৩৩ ও ১৭) পাস হতে হবে।</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml3" value="3">
                <label for="ml3"><span class="badge">অপশন ৩</span> সকল বিষয়ে CQ, MCQ এবং ICT-তে Practical আলাদাভাবে পাস।</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml4" value="4">
                <label for="ml4"><span class="badge">অপশন ৪</span> ৩ নং লজিকের মত, তবে বাংলা ২য় পত্রে শুধু ১৭ পাস (CQ/MCQ আলাদা নয়)।</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml5" value="5">
                <label for="ml5"><span class="badge">অপশন ৫</span> ৩ নং লজিকের মত, তবে ICT মোট ১৭ পাস (CQ/PRAC আলাদা নয়)।</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="master_logic" id="ml6" value="6">
                <label for="ml6"><span class="badge">অপশন ৬</span> ৪ নং লজিকের মত, তবে ICT মোট ১৭ পাস (CQ/PRAC আলাদা নয়)।</label>
            </div>
        </div>
    </div>

    <div class="section-card">
        <h2><i class="fas fa-calculator"></i> GPA ক্যালকুলেশন পদ্ধতি</h2>
        <div class="option-group">
            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="gpa_logic" id="gl1" value="1">
                <label for="gl1"><span class="badge">পদ্ধতি ১</span> GPA (৫.০০ স্কেলে) দেখানো হবে। ফেল করলে F1, F2 দেখাবে।</label>
            </div>

            <div class="option-item" onclick="this.querySelector('input').click()">
                <input type="radio" name="gpa_logic" id="gl2" value="2">
                <label for="gl2"><span class="badge">পদ্ধতি ২</span> পাস করলে GPA ঘর ফাঁকা থাকবে। ফেল করলে F1, F2 দেখাবে।</label>
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveNewLogics()">
        <i class="fas fa-save"></i> নতুন লজিক সেট করুন
    </button>

    <a href="file_BB.html" class="back-link"><i class="fas fa-arrow-left"></i> আগের পেইজে ফিরে যান</a>

    <div class="footer-text">SYSTEM DESIGN BY PALASH MAHMOD</div>
</div>

<script>
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('bba_master_settings'));
        if(saved) {
            if(saved.master_logic) {
                const mlEl = document.querySelector(`input[name="master_logic"][value="${saved.master_logic}"]`);
                if(mlEl) mlEl.checked = true;
            }
            if(saved.gpa_logic) {
                const glEl = document.querySelector(`input[name="gpa_logic"][value="${saved.gpa_logic}"]`);
                if(glEl) glEl.checked = true;
            }
        }
    }

    function saveNewLogics() {
        const mlValue = document.querySelector('input[name="master_logic"]:checked')?.value;
        const glValue = document.querySelector('input[name="gpa_logic"]:checked')?.value;
        
        if(!mlValue || !glValue) {
            alert("দয়া করে পাশ-গ্রেড লজিক এবং GPA পদ্ধতি উভয়ই সিলেক্ট করুন!");
            return;
        }

        const settings = {
            master_logic: mlValue,
            gpa_logic: glValue
        };
        
        localStorage.setItem('bba_master_settings', JSON.stringify(settings));
        alert("অভিনন্দন! আপনার লজিক সিস্টেম সফলভাবে সংরক্ষিত হয়েছে।");
    }
</script>
</body>
</html>
