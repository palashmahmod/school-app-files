<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাপ লোড হচ্ছে...</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        body { background: #31475e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .loader-container { text-align: center; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.2); border-top: 4px solid #ffffff; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 16px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="spinner"></div>
    <p id="status-text">সার্ভারের সাথে সংযোগ করা হচ্ছে...</p>
</div>

<script>
    // Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyDrIXV59kVjFKFKARHVJix7HuAU1FUfDk4",
        authDomain: "school-management-system-1279f.firebaseapp.com",
        databaseURL: "https://school-management-system-1279f-default-rtdb.firebaseio.com",
        projectId: "school-management-system-1279f",
        storageBucket: "school-management-system-1279f.firebasestorage.app",
        messagingSenderId: "862359845997",
        appId: "1:862359845997:web:e8a3c61807ae3b67971364",
        measurementId: "G-37D4DBEY18"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const statusText = document.getElementById('status-text');

    // Cache Busting-এর জন্য টাইমস্ট্যাম্প জেনারেটর
    const v = new Date().getTime();

    database.ref('control').once('value').then((snapshot) => {
        const data = snapshot.val();
        
        if (data && data.update_status === true) {
            statusText.innerText = "অনলাইন আপডেট চেক করা হচ্ছে...";
            // অনলাইন URL-এর সাথে টাইমস্ট্যাম্প যুক্ত করা হয়েছে
            const onlineTarget = data.online_url + "index.html?v=" + v;
            window.location.replace(onlineTarget);
        } else {
            statusText.innerText = "অ্যাপ শুরু হচ্ছে...";
            // লোকাল ফাইলের সাথেও টাইমস্ট্যাম্প যুক্ত করা হয়েছে
            window.location.href = "index.html?v=" + v;
        }
    }).catch((error) => {
        console.error("Firebase Connection Error:", error);
        // ইন্টারনেট না থাকলে বা এরর হলে লোকাল ফাইল লোড হবে
        window.location.href = "index.html?v=" + v;
    });
</script>
</body>
</html>
