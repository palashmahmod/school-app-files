<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শ্রেণি নির্ধারণ - CB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #4b6681 0%, #31475e 100%);
            --white: #ffffff;
            --primary: #1a73e8; 
            --dark: #2c3e50;
        }
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* অথরাইজেশন ওভারলে */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient); z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .auth-box { 
            text-align: center; width: 90%; max-width: 350px; padding: 40px 25px; 
            border-radius: 20px; background: var(--white);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.4);
        }
        .auth-box input { 
            width: 100%; padding: 15px; margin: 25px 0; border: 2px solid #ddd; 
            border-radius: 12px; text-align: center; font-size: 20px; outline: none;
            transition: 0.3s; background: #f9f9f9;
        }
        .auth-box input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 10px rgba(26, 115, 232, 0.2); }

        /* মেইন কার্ড */
        .card { 
            width: 90%; max-width: 400px; background: var(--white); padding: 30px 25px; 
            border-radius: 20px; display: none; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.4);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h2 { text-align: center; font-size: 20px; color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .option { 
            display: flex; align-items: center; gap: 15px; padding: 18px; 
            border: 2px solid #eee; border-radius: 15px; margin-bottom: 12px; 
            cursor: pointer; font-weight: bold; transition: 0.2s; color: var(--dark);
        }
        .option:hover { background: #f8faff; border-color: var(--primary); }
        .option input { transform: scale(1.5); cursor: pointer; accent-color: var(--primary); }

        .btn-save { 
            width: 100%; padding: 15px; background: var(--primary); color: #fff; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; 
            margin-top: 15px; font-size: 16px; transition: 0.2s;
            box-shadow: 0 5px 0px #0d47a1;
        }
        .btn-save:active { transform: translateY(3px); box-shadow: none; }

        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #7f8c8d; font-size: 14px; font-weight: 500; }
        .back-link:hover { color: var(--dark); }
    </style>
</head>

<body>
<div id="authOverlay">
    <div class="auth-box">
        <i class="fas fa-user-shield fa-4x" style="color: var(--primary);"></i>
        <h3 style="margin: 20px 0 10px; color: var(--dark);">অ্যাডমিন প্যানেল</h3>
        <p style="font-size: 14px; color: #7f8c8d;">সেটিংস পরিবর্তন করতে পাসওয়ার্ড দিন</p>
        
        <input type="password" id="passInput" placeholder="••••••••" autocomplete="off">
        
        <button class="btn-save" onclick="checkPass()">ভেরিফাই করুন</button>
        <a href="file_C.html" class="back-link">ফিরে যান</a>
    </div>
</div>

<div class="card" id="mainCard">
    <h2><i class="fas fa-layer-group"></i> শ্রেণি ও বিভাগ নির্ধারণ</h2>
    
    <div class="option" onclick="this.querySelector('input').click()">
        <input type="radio" name="grp" id="o1" value="junior">
        <label for="o1">৬ষ্ঠ-৮ম শ্রেণি</label>
    </div>

    <div class="option" onclick="this.querySelector('input').click()">
        <input type="radio" name="grp" id="o2" value="science">
        <label for="o2">৯ম-১০ম (বিজ্ঞান)</label>
    </div>

    <div class="option" onclick="this.querySelector('input').click()">
        <input type="radio" name="grp" id="o3" value="commerce">
        <label for="o3">৯ম-১০ম (ব্যবসায়)</label>
    </div>

    <div class="option" onclick="this.querySelector('input').click()">
        <input type="radio" name="grp" id="o4" value="humanities">
        <label for="o4">৯ম-১০ম (মানবিক)</label>
    </div>
    
    <button class="btn-save" onclick="save()">সেটিং সেভ করুন</button>
    <a href="file_C.html" class="back-link"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        if(pass === "pm55225522") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
        } else {
            alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            document.getElementById('passInput').value = "";
        }
    }

    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPass();
        }
    });

    window.onload = () => {
        const saved = localStorage.getItem('master_cb_setting');
        if(saved) {
            const input = document.querySelector(`input[value="${saved}"]`);
            if(input) input.checked = true;
        }
    };

    function save() {
        const sel = document.querySelector('input[name="grp"]:checked');
        if(!sel) return alert("একটি অপশন সিলেক্ট করুন!");
        
        localStorage.setItem('master_cb_setting', sel.value);
        alert("সফলভাবে সেভ হয়েছে!");
    }
</script>
</body>
</html>
