<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লজিক নির্ধারণ - BCAA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #4b6681 0%, #31475e 100%);
            --white: #ffffff;
            --accent: #1a73e8; 
            --dark: #333;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            margin: 0; padding: 20px; 
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            background: #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 20px; 
            color: var(--dark);
            margin: 0;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent);
            display: inline-block;
        }
        
        .section-title { 
            font-weight: bold; 
            margin-bottom: 15px; 
            display: block; 
            background: #f1f3f4; 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-size: 14px; 
            color: #555;
            border-left: 5px solid var(--accent);
        }
        
        .option-group { margin-bottom: 25px; }
        
        .option-card { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }

        /* রেডিও বাটন সিলেক্ট হলে স্টাইল পরিবর্তন */
        .option-card:has(input:checked) {
            border-color: var(--accent);
            background-color: #f0f7ff;
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.1);
        }

        .option-card:hover { border-color: var(--accent); background: #fafafa; }
        
        .option-card input { 
            width: 20px;
            height: 20px;
            cursor: pointer; 
            accent-color: var(--accent);
        }
        
        .option-card label { 
            cursor: pointer; 
            font-weight: 600; 
            flex: 1; 
            color: var(--dark);
            font-size: 14px;
        }

        .btn-save { 
            width: 100%; 
            padding: 15px; 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
            box-shadow: 0 4px 0px #0d47a1;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-save:active { 
            transform: translateY(3px); 
            box-shadow: none; 
        }

        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 25px; 
            text-decoration: none; 
            color: #d93025; 
            font-weight: bold; 
            font-size: 14px;
            transition: 0.2s;
        }
        
        .back-link:hover { opacity: 0.8; }

        .footer-text { 
            text-align: center; 
            font-size: 10px; 
            margin-top: 30px; 
            color: #aaa; 
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-cog"></i> লজিক নির্ধারণ (বিজ্ঞান বিভাগ)</h1>
    </div>

    <div class="option-group">
        <span class="section-title"><i class="fas fa-book"></i> ১. অপশনাল বিষয় সিলেকশন:</span>
        
        <div class="option-card" onclick="document.getElementById('opt1').checked=true">
            <input type="radio" name="optionalSub" id="opt1" value="higher_math">
            <label for="opt1">গার্হস্থ / উচ্চতর গণিত (অপশনাল)</label>
        </div>

        <div class="option-card" onclick="document.getElementById('opt2').checked=true">
            <input type="radio" name="optionalSub" id="opt2" value="biology">
            <label for="opt2">জীববিজ্ঞান (অপশনাল)</label>
        </div>
    </div>

    <div class="option-group">
        <span class="section-title"><i class="fas fa-calculator"></i> ২. GPA পদ্ধতি সিলেকশন:</span>
        
        <div class="option-card" onclick="document.getElementById('logic1').checked=true">
            <input type="radio" name="gpaLogic" id="logic1" value="ssc_logic">
            <label for="logic1">SSC পরীক্ষার GPA লজিক (F1, F2 সহ)</label>
        </div>

        <div class="option-card" onclick="document.getElementById('logic2').checked=true">
            <input type="radio" name="gpaLogic" id="logic2" value="no_logic">
            <label for="logic2">GPA লজিক ছাড়া (শুধুমাত্র F1, F2 লজিক)</label>
        </div>
    </div>

    <button class="btn-save" onclick="saveBCAASettings()">
        <i class="fas fa-save"></i> সেটিংস সেভ করুন
    </button>

    <a href="file_BCA.html" class="back-link">
        <i class="fas fa-arrow-left"></i> আগের পেইজে ফিরে যান
    </a>

    <div class="footer-text">POWERED BY PALASH MAHMOD</div>
</div>

<script>
    // পেজ লোড হলে আগের সেভ করা ডাটা দেখাবে
    window.onload = function() {
        const savedOptional = localStorage.getItem('bcaa_optional');
        const savedLogic = localStorage.getItem('bcaa_gpa_logic');
        
        if(savedOptional) {
            const optRadio = document.querySelector(`input[value="${savedOptional}"]`);
            if(optRadio) optRadio.checked = true;
        }
        if(savedLogic) {
            const logicRadio = document.querySelector(`input[value="${savedLogic}"]`);
            if(logicRadio) logicRadio.checked = true;
        }
    };

    function saveBCAASettings() {
        const optional = document.querySelector('input[name="optionalSub"]:checked');
        const logic = document.querySelector('input[name="gpaLogic"]:checked');

        if(!optional || !logic) {
            alert("দয়া করে সব অপশন সিলেক্ট করুন!");
            return;
        }

        localStorage.setItem('bcaa_optional', optional.value);
        localStorage.setItem('bcaa_gpa_logic', logic.value);
        
        alert("বিজ্ঞান বিভাগের লজিক সফলভাবে সেভ করা হয়েছে!");
    }
</script>
</body>
</html>
