<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আখাউড়া নাছরীন নবী পাইলট বালিকা উচ্চ বিদ্যালয়</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #4b6681 0%, #31475e 100%);
            --white: #ffffff;
            --text-main: #2c3e50;
            --primary-blue: #1a73e8;
            --danger: #e74c3c;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        /* --- স্মার্ট ৩ডি লগইন স্ক্রিন --- */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient);
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.3);
            text-align: center; 
            width: 85%; max-width: 350px;
            position: relative;
        }
        .login-card h1 { font-size: 19px; color: #1e3c72; margin-bottom: 25px; line-height: 1.5; font-weight: 800; }
        .login-card input { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            border: 1px solid #ddd; border-radius: 12px; 
            text-align: center; font-size: 17px; box-sizing: border-box; 
            background: #f0f3f7;
        }
        .login-btn { 
            background: var(--primary-blue); color: #fff; border: none; 
            padding: 15px; border-radius: 12px; width: 100%; 
            cursor: pointer; font-weight: bold; font-size: 16px; 
            box-shadow: 4px 4px 0px #0d47a1;
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .login-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px; }
        /* --- ফটো এবং ওভারলে টেক্সট স্টাইল --- */
        .school-img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ddd;
            background: #eee;
        }
        .school-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 9px;
            font-weight: 700;
            color: white;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 5px 0;
        }
        /* --- হোম পেজ কন্টেইনার --- */
        .container { 
            width: 100%; max-width: 550px; padding: 25px; margin: 0 auto;
            box-sizing: border-box; display: none; flex-direction: column; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 40px; color: var(--white); }
        .header h1 { font-size: 22px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .grid-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; 
        }
        .menu-card { 
            height: 140px; background: var(--white); 
            border-radius: 20px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-decoration: none; transition: all 0.2s ease; cursor: pointer;
            box-shadow: 8px 8px 15px rgba(0,0,0,0.4); 
            border: none;
        }
        .menu-card:hover { transform: translate(-2px, -2px); box-shadow: 12px 12px 20px rgba(0,0,0,0.5); }
        .menu-card:active { transform: translate(6px, 6px); box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .menu-card i { font-size: 35px; margin-bottom: 12px; }
        .card-a i { color: #1a73e8; }
        .card-b i { color: #2ecc71; }
        .card-c i { color: #f1c40f; }
        .card-d i { color: #e67e22; }
        .menu-card span { font-size: 13px; font-weight: 700; text-align: center; padding: 0 10px; color: #34495e; }
        .delete-btn-container { margin-top: 50px; text-align: center; }
        .delete-btn {
            background: var(--white); border: none; color: var(--danger);
            padding: 12px 25px; border-radius: 50px; font-size: 12px;
            cursor: pointer; font-weight: 700;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .delete-btn:active { transform: scale(0.95); box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .footer-text {
            font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.7);
            text-align: center; margin-top: auto; padding: 25px; 
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <i class="fas fa-lock" style="font-size: 40px; color: var(--primary-blue); margin-bottom: 15px;"></i>
            <h1>অ্যাডমিন লগইন</h1>
            <input type="password" id="pinInput" placeholder="পিন কোড দিন">
            <button class="login-btn" onclick="checkPin()">LOGIN</button>
            <div class="school-img-container">
                <img src="school_photo.jpg" alt="School Photo">
                <div class="overlay-footer">POWERED BY PALASH MAHMOD</div>
            </div>
        </div>
    </div>
    <div id="mainHome" class="container">
        <div class="header">
            <h1>আখাউড়া নাছরীন নবী পাইলট বালিকা উচ্চ বিদ্যালয়</h1>
        </div>
        <div class="grid-container">
            <a href="#" onclick="navigateWithCacheBusting('file_A.html')" class="menu-card card-a">
                <i class="fas fa-user-graduate"></i>
                <span>শিক্ষার্থী তথ্য ব্যবস্থাপনা (A)</span>
            </a>
            <a href="#" onclick="navigateWithCacheBusting('file_B.html')" class="menu-card card-b">
                <i class="fas fa-pen-to-square"></i>
                <span>ফলাফল এন্ট্রি (B)</span>
            </a>
            <a href="#" onclick="navigateWithCacheBusting('file_C.html')" class="menu-card card-c">
                <i class="fas fa-sliders"></i>
                <span>টেবিল সেটিংস (C)</span>
            </a>
            <a href="#" onclick="navigateWithCacheBusting('file_D.html')" class="menu-card card-d">
                <i class="fas fa-file-invoice"></i>
                <span>ফলাফল বিবরণী (D)</span>
            </a>
        </div>
        <div class="delete-btn-container">
            <button class="delete-btn" onclick="secureDelete()">
                <i class="fas fa-trash-can"></i> সকল তথ্য মুছুন
            </button>
        </div>
        <div class="footer-text">POWERED BY PALASH MAHMOD</div>
    </div>
    <script>
        const MASTER_PIN = "pm5522";

        function navigateWithCacheBusting(page) {
            const timestamp = new Date().getTime();
            window.location.href = page + "?v=" + timestamp;
        }

        function checkPin() {
            const pin = document.getElementById('pinInput').value;
            if (pin === MASTER_PIN) {
                localStorage.setItem("appLoggedIn", "true"); 
                showHome();
            } else {
                alert("ভুল পিন! আবার চেষ্টা করুন।");
            }
        }
        function showHome() {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('mainHome').style.display = "flex";
        }
        window.onload = function() {
            if (localStorage.getItem("appLoggedIn") === "true") {
                showHome();
            }
        }
        function secureDelete() {
            const pass = prompt("তথ্য মুছতে পাসওয়ার্ড দিন:");
            if (pass === MASTER_PIN) {
                if (confirm("আপনি কি নিশ্চিতভাবে সকল তথ্য ডিলিট করতে চান? এটি আর ফিরে পাওয়া যাবে না।")) {
                    localStorage.clear();
                    alert("সকল তথ্য সফলভাবে মুছে ফেলা হয়েছে।");
                    location.reload(); 
                }
            } else if (pass !== null) {
                alert("ভুল পাসওয়ার্ড! তথ্য মোছা সম্ভব হয়নি।");
            }
        }
    </script>
</body>
</html>
